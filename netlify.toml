[build]
  base = "src/mobile-web"
  command = "npm install && npm run build"
  publish = "dist"

# Proxy API requests to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://ai-widget-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
