[build]
  base = "src/mobile-web"
  command = "npm install && npm run build"
  publish = "dist"
  # 禁用 base-dir 变更检测，因为 widget-templates 在 base 外但会被 cp 到 dist
  ignore = "/bin/false"

# Proxy API requests to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://ai-widget-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
