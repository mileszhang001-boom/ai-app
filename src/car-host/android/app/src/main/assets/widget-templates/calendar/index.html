<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1013">
  <title>日程卡片</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/visual-styles.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget-calendar">
    <!-- 光晕 -->
    <div class="glow-primary"></div>

    <!-- 氛围光线 -->
    <div class="ambient-line"></div>

    <div class="content">
      <!-- 顶部：类别标注 + 星期 -->
      <div class="header">
        <div class="header-left">
          <div class="header-indicator"></div>
          <div class="category-label">schedule</div>
        </div>
        <div class="weekday" id="weekdayName">--</div>
      </div>

      <!-- 核心：日期数字 + 月/年 -->
      <div class="date-hero">
        <span class="date-number" id="dateNumber">--</span>
        <div class="date-meta">
          <span class="date-month" id="dateMonth">--月</span>
          <span class="date-year" id="dateYear">----</span>
        </div>
      </div>

      <!-- 农历信息 -->
      <div class="lunar-info" id="lunarInfo">--</div>

      <!-- 毛玻璃时间线 -->
      <div class="glass-timeline" id="timeline">
        <div class="event-item">
          <div class="event-time">--:--</div>
          <div class="event-line">
            <div class="event-dot"></div>
          </div>
          <div class="event-info">
            <div class="event-title">--</div>
            <div class="event-location">--</div>
          </div>
        </div>
      </div>

      <!-- 下一事件倒计时 -->
      <div class="next-event-countdown" id="countdown">
        <span class="countdown-text">--</span>
      </div>
    </div>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/color-engine.js"></script>
  <script src="main.js"></script>
</body>
</html>
