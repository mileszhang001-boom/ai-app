<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI小组件 · Ambient Light 预览</title>
  <style>
    /* 预览页面容器样式 */
    :root {
      --preview-bg-dark: linear-gradient(180deg, #0a0b0d 0%, #0e1013 100%);
      --preview-bg-light: linear-gradient(180deg, #dde3eb 0%, #e4e9f0 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--preview-bg-dark);
      min-height: 100vh;
      color: #fff;
      padding: 40px 20px;
    }

    .page-header {
      text-align: center;
      padding: 20px 0 40px;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
    }

    .preview-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .widget-large {
      width: 240px;
      height: 392px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .widgets-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .widget-small {
      width: 136px;
      height: 222px;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .widget-small:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .widget-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      text-align: center;
    }

    /* 动画 */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeInUp 0.5s ease-out;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-title">AI小组件 · Ambient Light</div>
    <div class="page-subtitle">设计语言：暗色空间中的精确信息 · 极端字号对比 · tonal 色彩系统 · 氛围光线</div>
  </header>

  <main class="preview-container">
    <!-- 大卡片预览 -->
    <div class="section">
      <div class="section-title">车端 1/3 屏卡片 (896×1464)</div>
      <div class="widget-large animate-in" style="animation-delay: 0s;">
        <iframe src="../widget-templates/anniversary/love/index.html" style="width:100%;height:100%;border:none;"></iframe>
      </div>
    </div>

    <!-- 小卡片网格 -->
    <div class="section">
      <div class="section-title">全部组件 (1/4 缩放)</div>
      <div class="widgets-grid">
        <!-- 恋爱纪念 -->
        <div>
          <div class="widget-small animate-in" style="animation-delay: 0.1s;">
            <iframe src="../widget-templates/anniversary/love/index.html" style="width:100%;height:100%;border:none;"></iframe>
          </div>
          <div class="widget-label">恋爱纪念</div>
        </div>
        <!-- 放假倒计时 -->
        <div>
          <div class="widget-small animate-in" style="animation-delay: 0.15s;">
            <iframe src="../widget-templates/anniversary/holiday/index.html" style="width:100%;height:100%;border:none;"></iframe>
          </div>
          <div class="widget-label">放假倒计时</div>
        </div>
        <!-- 宝宝成长 -->
        <div>
          <div class="widget-small animate-in" style="animation-delay: 0.2s;">
            <iframe src="../widget-templates/anniversary/baby/index.html" style="width:100%;height:100%;border:none;"></iframe>
          </div>
          <div class="widget-label">宝宝成长</div>
        </div>
        <!-- 暖橙纪念 -->
        <div>
          <div class="widget-small animate-in" style="animation-delay: 0.25s;">
            <iframe src="../widget-templates/anniversary/warm/index.html" style="width:100%;height:100%;border:none;"></iframe>
          </div>
          <div class="widget-label">暖橙纪念</div>
        </div>
        <!-- 每日新闻 -->
        <div>
          <div class="widget-small animate-in" style="animation-delay: 0.3s;">
            <iframe src="../widget-templates/news/index.html" style="width:100%;height:100%;border:none;"></iframe>
          </div>
          <div class="widget-label">每日新闻</div>
        </div>
        <!-- 闹钟 -->
        <div>
          <div class="widget-small animate-in" style="animation-delay: 0.35s;">
            <iframe src="../widget-templates/alarm/index.html" style="width:100%;height:100%;border:none;"></iframe>
          </div>
          <div class="widget-label">闹钟</div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
