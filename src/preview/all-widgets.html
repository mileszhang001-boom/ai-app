<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI小组件 - 全组件预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1A1A2E 0%, #0F0F1A 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 40px;
      font-size: 32px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .preview-item {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .preview-label {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }
    .widget-wrapper {
      width: 100%;
      aspect-ratio: 896 / 1464;
      max-height: 500px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <h1>AI小组件 - Ambient Light 全组件预览</h1>
  <div class="preview-grid">

    <!-- 恋爱纪念 -->
    <div class="preview-item">
      <div class="widget-wrapper">
        <iframe src="../widget-templates/anniversary/love/index.html"></iframe>
      </div>
      <div class="preview-label">恋爱纪念 · 玫瑰</div>
    </div>

    <!-- 宝宝成长 -->
    <div class="preview-item">
      <div class="widget-wrapper">
        <iframe src="../widget-templates/anniversary/baby/index.html"></iframe>
      </div>
      <div class="preview-label">宝宝成长 · 靛蓝</div>
    </div>

    <!-- 放假倒计时 -->
    <div class="preview-item">
      <div class="widget-wrapper">
        <iframe src="../widget-templates/anniversary/holiday/index.html"></iframe>
      </div>
      <div class="preview-label">放假倒计时 · 翠绿</div>
    </div>

    <!-- 暖橙纪念 -->
    <div class="preview-item">
      <div class="widget-wrapper">
        <iframe src="../widget-templates/anniversary/warm/index.html"></iframe>
      </div>
      <div class="preview-label">暖橙纪念 · 琥珀</div>
    </div>

    <!-- 每日新闻 -->
    <div class="preview-item">
      <div class="widget-wrapper">
        <iframe src="../widget-templates/news/index.html"></iframe>
      </div>
      <div class="preview-label">每日新闻 · 科技蓝</div>
    </div>

    <!-- 闹钟 -->
    <div class="preview-item">
      <div class="widget-wrapper">
        <iframe src="../widget-templates/alarm/index.html"></iframe>
      </div>
      <div class="preview-label">闹钟 · 小米橙</div>
    </div>

  </div>
</body>
</html>
