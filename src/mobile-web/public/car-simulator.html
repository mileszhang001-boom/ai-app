<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车端模拟器 · AI小组件</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    /* 车机屏幕容器 */
    .car-screen {
      position: relative;
      width: 896px;
      height: 1464px;
      background: #0e1013;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.05);
      /* 缩放适配浏览器 */
      transform-origin: center center;
    }

    /* WebView 区域 */
    .webview-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .webview-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0e1013;
    }

    /* 切换箭头 */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      opacity: 0.3;
      transition: opacity 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .nav-arrow:hover { opacity: 0.8; }
    .nav-arrow:active { opacity: 1; }

    .nav-arrow.left { left: 8px; }
    .nav-arrow.right { right: 8px; }

    .nav-arrow svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: rgba(255,255,255,0.6);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 自动隐藏箭头 */
    .nav-arrow.hidden { opacity: 0; pointer-events: none; }

    /* 圆点指示器 */
    .dot-indicator {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .dot-indicator.hidden { opacity: 0; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .dot.active {
      background: rgba(255,255,255,0.9);
      width: 16px;
      border-radius: 3px;
    }

    /* 入场动画 */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeSlideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .webview-container.slide-right {
      animation: fadeSlideIn 0.3s ease-out;
    }

    .webview-container.slide-left {
      animation: fadeSlideInLeft 0.3s ease-out;
    }

    /* 顶部状态栏（模拟车机） */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* 底部控制面板 */
    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(30,30,50,0.9);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .ctrl-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .ctrl-btn.active {
      background: rgba(255,106,0,0.2);
      border-color: rgba(255,106,0,0.4);
      color: #FF6A00;
    }

    .ctrl-btn.primary {
      background: rgba(255,106,0,0.15);
      border-color: rgba(255,106,0,0.3);
      color: #FF6A00;
    }

    /* 缩放提示 */
    .scale-info {
      position: fixed;
      top: 12px;
      right: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      z-index: 100;
    }

    /* 加载遮罩 */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #0e1013;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .loading-overlay.active {
      opacity: 1;
    }

    /* 单组件时隐藏导航 */
    .single-widget .nav-arrow,
    .single-widget .dot-indicator { display: none; }

    /* 同步到达通知 */
    .sync-toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0, 200, 83, 0.15);
      border: 1px solid rgba(0, 200, 83, 0.3);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 30;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .sync-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 轮询状态指示灯 */
    .poll-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0, 200, 83, 0.6);
      z-index: 25;
      transition: opacity 0.3s;
    }

    .poll-indicator.polling {
      animation: pulse-dot 1s ease infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* 响应式缩放 */
    @media (max-height: 1600px) {
      .car-screen { transform: scale(0.65); }
    }
    @media (max-height: 1200px) {
      .car-screen { transform: scale(0.5); }
    }
    @media (max-height: 900px) {
      .car-screen { transform: scale(0.42); }
    }
    @media (max-height: 700px) {
      .car-screen { transform: scale(0.35); }
    }
  </style>
</head>
<body>

  <!-- 车机屏幕 -->
  <div class="car-screen" id="carScreen">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span id="clock">--:--</span>
      <span>AI小组件 · Demo</span>
    </div>

    <!-- WebView 容器 -->
    <div class="webview-container" id="webviewContainer">
      <iframe id="widgetFrame" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="loading-overlay" id="loadingOverlay"></div>
    </div>

    <!-- 切换箭头 -->
    <div class="nav-arrow left" id="navLeft" onclick="switchWidget(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="nav-arrow right" id="navRight" onclick="switchWidget(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </div>

    <!-- 圆点指示器 -->
    <div class="dot-indicator" id="dotIndicator"></div>

    <!-- 同步到达通知 -->
    <div class="sync-toast" id="syncToast"></div>

    <!-- 轮询状态灯 -->
    <div class="poll-indicator" id="pollIndicator" title="自动同步监听中"></div>
  </div>

  <!-- 缩放信息 -->
  <div class="scale-info" id="scaleInfo">896×1464</div>

  <!-- 控制面板 -->
  <div class="control-panel">
    <button class="ctrl-btn active" onclick="loadPreset('love')">💕 恋爱</button>
    <button class="ctrl-btn" onclick="loadPreset('baby')">👶 宝宝</button>
    <button class="ctrl-btn" onclick="loadPreset('holiday')">🏖️ 放假</button>
    <button class="ctrl-btn" onclick="loadPreset('warm')">🔥 暖橙</button>
    <button class="ctrl-btn" onclick="loadPreset('news')">📰 新闻</button>
    <button class="ctrl-btn" onclick="loadPreset('alarm')">⏰ 闹钟</button>
    <button class="ctrl-btn primary" onclick="loadAllWidgets()">全部加载</button>
    <button class="ctrl-btn" onclick="loadSyncedWidgets()" id="syncLoadBtn">🔄 同步组件</button>
  </div>

<script>
  // ── 组件管理 ──

  const WIDGET_BASE = '/widget-templates';
  const API_BASE = '';  // 同源，前端 dev server 代理 /api

  // 模板路径映射（用于同步组件）
  const TEMPLATE_URL_MAP = {
    'anniversary-love':    `${WIDGET_BASE}/anniversary/love/index.html`,
    'anniversary-baby':    `${WIDGET_BASE}/anniversary/baby/index.html`,
    'anniversary-holiday': `${WIDGET_BASE}/anniversary/holiday/index.html`,
    'anniversary-warm':    `${WIDGET_BASE}/anniversary/warm/index.html`,
    'news-daily':          `${WIDGET_BASE}/news/index.html`,
    'news':                `${WIDGET_BASE}/news/index.html`,
    'alarm-clock':         `${WIDGET_BASE}/alarm/index.html`,
    'alarm':               `${WIDGET_BASE}/alarm/index.html`,
    'weather-realtime':    `${WIDGET_BASE}/weather/index.html`,
    'weather':             `${WIDGET_BASE}/weather/index.html`,
    'music-player':        `${WIDGET_BASE}/music/index.html`,
    'music':               `${WIDGET_BASE}/music/index.html`,
    'calendar-schedule':   `${WIDGET_BASE}/calendar/index.html`,
    'calendar':            `${WIDGET_BASE}/calendar/index.html`,
  };

  function getTemplateUrl(componentType, theme) {
    return TEMPLATE_URL_MAP[`${componentType}-${theme}`]
        || TEMPLATE_URL_MAP[componentType]
        || null;
  }

  // 组件列表（模板路径 + 默认参数）
  const WIDGET_PRESETS = {
    love: {
      path: `${WIDGET_BASE}/anniversary/love/index.html`,
      label: '恋爱纪念',
      params: { title: '恋爱纪念', startDate: '2024-06-01', subtitle: '每一天都算数' }
    },
    baby: {
      path: `${WIDGET_BASE}/anniversary/baby/index.html`,
      label: '宝宝成长',
      params: { title: '宝宝成长', startDate: '2025-01-15', subtitle: '慢慢长大不着急' }
    },
    holiday: {
      path: `${WIDGET_BASE}/anniversary/holiday/index.html`,
      label: '放假倒计时',
      params: { title: '国庆快乐', targetDate: '2026-10-01', subtitle: '假期在向你招手' }
    },
    warm: {
      path: `${WIDGET_BASE}/anniversary/warm/index.html`,
      label: '暖橙纪念',
      params: { title: '结婚纪念', startDate: '2020-05-20', subtitle: '岁月温柔' }
    },
    news: {
      path: `${WIDGET_BASE}/news/index.html`,
      label: '每日新闻',
      params: {}
    },
    alarm: {
      path: `${WIDGET_BASE}/alarm/index.html`,
      label: '闹钟',
      params: {}
    }
  };

  // widgetItems: 统一的渲染列表 [{ type: 'preset'|'synced', key, path, params, label }]
  let widgetItems = [];
  let currentIndex = 0;
  let hideTimer = null;

  const frame = document.getElementById('widgetFrame');
  const container = document.getElementById('webviewContainer');
  const navLeft = document.getElementById('navLeft');
  const navRight = document.getElementById('navRight');
  const dotIndicator = document.getElementById('dotIndicator');
  const carScreen = document.getElementById('carScreen');

  // ── 时钟 ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2, '0') + ':' +
      now.getMinutes().toString().padStart(2, '0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── 构建预设 widgetItem ──
  function presetToItem(key) {
    const preset = WIDGET_PRESETS[key];
    if (!preset) return null;
    return { type: 'preset', key, path: preset.path, params: preset.params, label: preset.label };
  }

  // ── 加载单个预设 ──
  function loadPreset(key) {
    const item = presetToItem(key);
    if (!item) return;
    widgetItems = [item];
    currentIndex = 0;
    renderWidget();
    updateControls();

    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(WIDGET_PRESETS[key]?.label || ''));
    });
  }

  // ── 加载全部预设 ──
  function loadAllWidgets() {
    widgetItems = Object.keys(WIDGET_PRESETS).map(presetToItem).filter(Boolean);
    currentIndex = 0;
    renderWidget();
    updateControls();

    document.querySelectorAll('.ctrl-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector('.ctrl-btn.primary')?.classList.add('active');
  }

  // ── 从后端拉取同步组件 ──
  async function loadSyncedWidgets() {
    const syncBtn = document.getElementById('syncLoadBtn');
    syncBtn.textContent = '⏳ 加载中…';
    syncBtn.disabled = true;

    try {
      // 1. 获取设备上已同步的 widget_id 列表
      const deviceRes = await fetch(`${API_BASE}/api/device/demo_device/widgets`);
      if (!deviceRes.ok) throw new Error(`HTTP ${deviceRes.status}`);
      const deviceData = await deviceRes.json();
      const syncedWidgets = (deviceData.widgets || []).filter(w => w.status === 'success');

      if (syncedWidgets.length === 0) {
        syncBtn.textContent = '❌ 无同步组件';
        setTimeout(() => { syncBtn.textContent = '🔄 同步组件'; syncBtn.disabled = false; }, 2000);
        return;
      }

      // 2. 逐个获取 widget 详情
      const syncedItems = [];
      for (const w of syncedWidgets) {
        try {
          const detailRes = await fetch(`${API_BASE}/api/widgets/${w.widget_id}`);
          if (!detailRes.ok) continue;
          const detail = await detailRes.json();

          // AI编程模式：直接用 html_content 渲染
          if (detail.generation_mode === 'code' && detail.html_content) {
            syncedItems.push({
              type: 'code',
              key: w.widget_id,
              html_content: detail.html_content,
              label: 'AI编程'
            });
            continue;
          }

          const templateUrl = getTemplateUrl(detail.component_type, detail.theme);
          if (!templateUrl) continue;

          syncedItems.push({
            type: 'synced',
            key: w.widget_id,
            path: templateUrl,
            params: detail.params || {},
            style_preset: detail.style_preset,
            label: `${detail.component_type}/${detail.theme || ''}`
          });
        } catch (e) {
          console.warn('[Sync] Failed to fetch widget detail:', w.widget_id, e);
        }
      }

      if (syncedItems.length === 0) {
        syncBtn.textContent = '❌ 无可渲染组件';
        setTimeout(() => { syncBtn.textContent = '🔄 同步组件'; syncBtn.disabled = false; }, 2000);
        return;
      }

      // 3. 追加到已有预设列表（或单独展示同步组件）
      widgetItems = [...Object.keys(WIDGET_PRESETS).map(presetToItem).filter(Boolean), ...syncedItems];
      currentIndex = widgetItems.length - syncedItems.length; // 跳到第一个同步组件
      renderWidget();
      updateControls();

      syncBtn.textContent = `✅ 已加载 ${syncedItems.length} 个`;
      document.querySelectorAll('.ctrl-btn').forEach(btn => btn.classList.remove('active'));
    } catch (e) {
      console.error('[Sync] Load error:', e);
      syncBtn.textContent = '❌ 加载失败';
    } finally {
      setTimeout(() => { syncBtn.textContent = '🔄 同步组件'; syncBtn.disabled = false; }, 3000);
    }
  }

  // ── 渲染当前组件（支持 preset 和 synced 两种模式） ──
  const loadingOverlay = document.getElementById('loadingOverlay');

  async function renderWidget(direction) {
    if (widgetItems.length === 0) return;

    const item = widgetItems[currentIndex];
    if (!item) return;

    // 显示加载遮罩
    loadingOverlay.classList.add('active');

    // 切换动画
    if (direction !== undefined) {
      container.classList.remove('slide-left', 'slide-right');
      void container.offsetWidth;
      container.classList.add(direction > 0 ? 'slide-right' : 'slide-left');
    }

    if (item.type === 'code') {
      // AI编程模式：直接用 html_content 渲染到 sandbox iframe
      try {
        frame.removeAttribute('src');
        frame.srcdoc = item.html_content;
        frame.onload = () => {
          setTimeout(() => loadingOverlay.classList.remove('active'), 100);
        };
      } catch (e) {
        console.error('[Render] Code widget error:', e);
        loadingOverlay.classList.remove('active');
      }
    } else if (item.type === 'synced') {
      // 同步组件：用 srcdoc 注入 __WIDGET_PARAMS__（与 preview.js 一致）
      try {
        const resp = await fetch(`${item.path}?v=${Date.now()}`, { cache: 'no-cache' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        let html = await resp.text();

        const templateBasePath = item.path.replace('index.html', '');

        // 修复相对路径（与 render-widget.js 保持一致）
        const ts = Date.now();
        html = html.replace(/(src|href)="\.\.\/\.\.\/shared\//g, '$1="/widget-templates/shared/');
        html = html.replace(/(src|href)="\.\.\/shared\//g, '$1="/widget-templates/shared/');
        html = html.replace(/href="style\.css"/g, `href="${templateBasePath}style.css?v=${ts}"`);
        html = html.replace(/src="style\.css"/g, `src="${templateBasePath}style.css?v=${ts}"`);
        html = html.replace(/src="main\.js"/g, `src="${templateBasePath}main.js?v=${ts}"`);
        html = html.replace(/(src|href)="(\/widget-templates\/[^"?]+)"/g, `$1="$2?v=${ts}"`);

        // 注入 style_preset
        if (item.style_preset) {
          html = html.replace(/<html/, `<html data-style="${item.style_preset}"`);
        }

        // 注入 templateBasePath + __WIDGET_PARAMS__
        const basePathScript = `<script>window.__TEMPLATE_BASE_PATH__ = "${templateBasePath}";<\/script>`;
        const paramsScript = `<script>window.__WIDGET_PARAMS__ = ${JSON.stringify(item.params)};<\/script>`;
        html = html.replace('</head>', basePathScript + paramsScript + '</head>');

        frame.removeAttribute('src');
        frame.srcdoc = html;
        frame.onload = () => {
          setTimeout(() => loadingOverlay.classList.remove('active'), 100);
        };
      } catch (e) {
        console.error('[Render] Synced widget error:', e);
        loadingOverlay.classList.remove('active');
      }
    } else {
      // 预设组件：直接加载 iframe src
      frame.removeAttribute('srcdoc');
      frame.src = item.path;
      frame.onload = () => {
        setTimeout(() => loadingOverlay.classList.remove('active'), 100);
      };
    }
  }

  // ── 切换组件 ──
  function switchWidget(direction) {
    if (widgetItems.length <= 1) return;

    currentIndex += direction;
    if (currentIndex < 0) currentIndex = widgetItems.length - 1;
    if (currentIndex >= widgetItems.length) currentIndex = 0;

    renderWidget(direction);
    updateDots();
    resetHideTimer();
  }

  // ── 更新导航控件 ──
  function updateControls() {
    const single = widgetItems.length <= 1;
    carScreen.classList.toggle('single-widget', single);

    if (!single) {
      updateDots();
      showNavigation();
      resetHideTimer();
    }
  }

  // ── 更新圆点 ──
  function updateDots() {
    dotIndicator.innerHTML = widgetItems.map((_, i) =>
      `<div class="dot${i === currentIndex ? ' active' : ''}"></div>`
    ).join('');
  }

  // ── 显示/隐藏导航 ──
  function showNavigation() {
    navLeft.classList.remove('hidden');
    navRight.classList.remove('hidden');
    dotIndicator.classList.remove('hidden');
  }

  function hideNavigation() {
    navLeft.classList.add('hidden');
    navRight.classList.add('hidden');
    // 圆点保持显示
  }

  function resetHideTimer() {
    clearTimeout(hideTimer);
    showNavigation();
    hideTimer = setTimeout(hideNavigation, 3000);
  }

  // 触摸/鼠标移动时显示导航
  carScreen.addEventListener('mousemove', resetHideTimer);
  carScreen.addEventListener('touchstart', resetHideTimer);

  // ── 键盘快捷键 ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') switchWidget(-1);
    if (e.key === 'ArrowRight') switchWidget(1);
  });

  // ── 同步到达通知 ──
  function showSyncToast(message) {
    const toast = document.getElementById('syncToast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── 自动轮询：监听手机端推送的新组件 ──
  const POLL_INTERVAL = 5000;
  const knownWidgetIds = new Set();  // 已知的 widget_id，避免重复
  let pollTimer = null;

  async function pollForNewWidgets() {
    const indicator = document.getElementById('pollIndicator');
    indicator.classList.add('polling');

    try {
      const res = await fetch(`${API_BASE}/api/device/demo_device/widgets`);
      if (!res.ok) return;
      const data = await res.json();
      const successWidgets = (data.widgets || []).filter(w => w.status === 'success');

      // 找出新到达的组件
      const newWidgets = successWidgets.filter(w => !knownWidgetIds.has(w.widget_id));
      if (newWidgets.length === 0) return;

      // 记录所有已知 ID
      for (const w of successWidgets) knownWidgetIds.add(w.widget_id);

      // 拉取新组件详情并加入渲染列表
      const newItems = [];
      for (const w of newWidgets) {
        try {
          const detailRes = await fetch(`${API_BASE}/api/widgets/${w.widget_id}`);
          if (!detailRes.ok) continue;
          const detail = await detailRes.json();

          // AI编程模式：直接用 html_content 渲染
          if (detail.generation_mode === 'code' && detail.html_content) {
            newItems.push({
              type: 'code',
              key: w.widget_id,
              html_content: detail.html_content,
              label: 'AI编程'
            });
            continue;
          }

          const templateUrl = getTemplateUrl(detail.component_type, detail.theme);
          if (!templateUrl) continue;

          newItems.push({
            type: 'synced',
            key: w.widget_id,
            path: templateUrl,
            params: detail.params || {},
            style_preset: detail.style_preset,
            label: `${detail.component_type}/${detail.theme || ''}`
          });
        } catch (e) {
          console.warn('[Poll] Fetch detail error:', w.widget_id, e);
        }
      }

      if (newItems.length === 0) return;

      // 追加到当前列表末尾
      widgetItems = [...widgetItems, ...newItems];

      // 自动跳转到新到来的第一个组件
      currentIndex = widgetItems.length - newItems.length;
      renderWidget(1);
      updateControls();

      // 显示到达通知
      const label = newItems.length === 1
        ? `收到新卡片: ${newItems[0].label}`
        : `收到 ${newItems.length} 张新卡片`;
      showSyncToast(label);

      console.log('[Poll] New widgets arrived:', newItems.map(i => i.key));
    } catch (e) {
      // 静默处理网络错误
      console.warn('[Poll] Error:', e.message);
    } finally {
      indicator.classList.remove('polling');
    }
  }

  function startPolling() {
    // 初始记录已有的 synced widget IDs（避免首次轮询误报）
    fetch(`${API_BASE}/api/device/demo_device/widgets`)
      .then(r => r.ok ? r.json() : { widgets: [] })
      .then(data => {
        for (const w of (data.widgets || [])) knownWidgetIds.add(w.widget_id);
        console.log('[Poll] Initial known widgets:', knownWidgetIds.size);
      })
      .catch(() => {});

    pollTimer = setInterval(pollForNewWidgets, POLL_INTERVAL);
    console.log(`[Poll] Auto-sync started (${POLL_INTERVAL / 1000}s interval)`);
  }

  // ── 初始加载 ──
  loadPreset('love');
  startPolling();
</script>
