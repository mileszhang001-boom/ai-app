<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车端模拟器 · AI小组件</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    /* 车机屏幕容器 */
    .car-screen {
      position: relative;
      width: 896px;
      height: 1464px;
      background: #0e1013;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.05);
      /* 缩放适配浏览器 */
      transform-origin: center center;
    }

    /* WebView 区域 */
    .webview-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .webview-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0e1013;
    }

    /* 切换箭头 */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      opacity: 0.3;
      transition: opacity 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .nav-arrow:hover { opacity: 0.8; }
    .nav-arrow:active { opacity: 1; }

    .nav-arrow.left { left: 8px; }
    .nav-arrow.right { right: 8px; }

    .nav-arrow svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: rgba(255,255,255,0.6);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 自动隐藏箭头 */
    .nav-arrow.hidden { opacity: 0; pointer-events: none; }

    /* 圆点指示器 */
    .dot-indicator {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 50;
      transition: opacity 0.3s;
    }

    .dot-indicator.hidden { opacity: 0; }

    .dot-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .dot-indicator .dot.active {
      width: 24px;
      background: #F5F5F0;
    }

    /* 入场动画 */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeSlideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .webview-container.slide-right {
      animation: fadeSlideIn 0.3s ease-out;
    }

    .webview-container.slide-left {
      animation: fadeSlideInLeft 0.3s ease-out;
    }

    /* 顶部状态栏（模拟车机） */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* 底部控制面板 */
    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(30,30,50,0.9);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .ctrl-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .ctrl-btn.active {
      background: rgba(255,106,0,0.2);
      border-color: rgba(255,106,0,0.4);
      color: #FF6A00;
    }

    .ctrl-btn.primary {
      background: rgba(255,106,0,0.15);
      border-color: rgba(255,106,0,0.3);
      color: #FF6A00;
    }

    /* 缩放提示 */
    .scale-info {
      position: fixed;
      top: 12px;
      right: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      z-index: 100;
    }

    /* 加载遮罩 */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #0e1013;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .loading-overlay.active {
      opacity: 1;
    }

    /* 单组件时隐藏导航 */
    .single-widget .nav-arrow,
    .single-widget .dot-indicator { display: none; }

    /* 同步到达通知 */
    .sync-toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0, 200, 83, 0.15);
      border: 1px solid rgba(0, 200, 83, 0.3);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 30;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .sync-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 轮询状态指示灯 */
    .poll-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0, 200, 83, 0.6);
      z-index: 25;
      transition: opacity 0.3s;
    }

    .poll-indicator.polling {
      animation: pulse-dot 1s ease infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* 同步确认弹窗 */
    .sync-confirm-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none;
      justify-content: center;
      align-items: center;
      animation: overlayFadeIn 0.3s ease;
    }
    .sync-confirm-overlay.visible { display: flex; }

    .sync-confirm-panel {
      width: 720px;
      padding: 40px 48px;
      background: #1E2530;
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: panelScaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes panelScaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .sync-confirm-icon { font-size: 56px; }
    .sync-confirm-title { font-size: 40px; font-weight: 600; color: #F5F5F0; }
    .sync-confirm-desc { font-size: 28px; color: #94A3B8; text-align: center; line-height: 1.5; }
    .sync-confirm-buttons { display: flex; gap: 24px; width: 100%; }
    .sync-btn-cancel, .sync-btn-accept {
      flex: 1; height: 88px; border: none; border-radius: 20px;
      font-size: 32px; cursor: pointer; font-family: inherit;
    }
    .sync-btn-cancel { background: rgba(255,255,255,0.06); color: #94A3B8; font-weight: 500; }
    .sync-btn-accept { background: #4A6CF7; color: #fff; font-weight: 600; }
    .sync-btn-cancel:active { background: rgba(255,255,255,0.12); }
    .sync-btn-accept:active { background: #3A5CE7; }

    /* 滑动提示 */
    .swipe-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 32px;
      background: rgba(255,255,255,0.08);
      border-radius: 40px;
      font-size: 24px;
      color: #F5F5F0;
      z-index: 60;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .swipe-hint.visible { opacity: 1; }

    /* 卡片切换动画 */
    @keyframes cardSlideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(-200px); opacity: 0.3; }
    }
    @keyframes cardSlideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(200px); opacity: 0.3; }
    }
    @keyframes cardSlideInFromRight {
      from { transform: translateX(200px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes cardSlideInFromLeft {
      from { transform: translateX(-200px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .webview-container.anim-slide-out-left {
      animation: cardSlideOutLeft 0.3s ease forwards;
    }
    .webview-container.anim-slide-out-right {
      animation: cardSlideOutRight 0.3s ease forwards;
    }
    .webview-container.anim-slide-in-from-right {
      animation: cardSlideInFromRight 0.3s ease forwards;
    }
    .webview-container.anim-slide-in-from-left {
      animation: cardSlideInFromLeft 0.3s ease forwards;
    }

    /* 响应式缩放 */
    @media (max-height: 1600px) {
      .car-screen { transform: scale(0.65); }
    }
    @media (max-height: 1200px) {
      .car-screen { transform: scale(0.5); }
    }
    @media (max-height: 900px) {
      .car-screen { transform: scale(0.42); }
    }
    @media (max-height: 700px) {
      .car-screen { transform: scale(0.35); }
    }

    /* ══ 编辑态 ══ */
    .edit-overlay {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: none;
      flex-direction: column;
      background: rgba(0,0,0,0.4);
    }

    .edit-overlay.active {
      display: flex;
    }

    .edit-hint {
      text-align: center;
      padding: 14px 0;
      font-size: 22px;
      color: rgba(255,255,255,0.35);
    }

    .edit-card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .edit-card-wrapper {
      position: relative;
      width: 80%;
      height: 80%;
    }

    .edit-delete-btn {
      position: absolute;
      top: -18px;
      right: -18px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: rgba(255,60,60,0.85);
      color: #fff;
      font-size: 32px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 4px 16px rgba(255,0,0,0.3);
      border: none;
      -webkit-tap-highlight-color: transparent;
    }

    .edit-delete-btn:active { transform: scale(0.9); }

    .edit-card-label {
      text-align: center;
      font-size: 24px;
      color: rgba(255,255,255,0.5);
      padding: 12px 0;
    }

    .edit-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
      padding: 8px 0;
    }

    .edit-dots .ed {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
    }

    .edit-dots .ed.active {
      width: 10px;
      height: 10px;
      background: #fff;
    }

    .edit-bottom-bar {
      height: 94px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .edit-done-btn {
      width: 200px;
      height: 60px;
      border-radius: 30px;
      background: linear-gradient(180deg, #3B82F6, #2563EB);
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .edit-done-btn:active { opacity: 0.8; }

    /* 编辑态下隐藏常规导航 */
    .car-screen.editing .nav-arrow,
    .car-screen.editing .dot-indicator,
    .car-screen.editing .status-bar { opacity: 0; pointer-events: none; }

    .car-screen.editing .webview-container {
      transform: scale(0.8);
      transform-origin: center center;
      border-radius: 48px;
      transition: transform 0.3s ease;
    }

    /* 删除确认弹窗 */
    .edit-confirm {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30,30,40,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
      z-index: 70;
      display: none;
    }

    .edit-confirm.show { display: block; }

    .edit-confirm p {
      color: rgba(255,255,255,0.8);
      font-size: 24px;
      margin-bottom: 24px;
    }

    .edit-confirm-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .edit-confirm-btns button {
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 22px;
      border: none;
      cursor: pointer;
    }

    .ecb-cancel {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }

    .ecb-delete {
      background: rgba(255,60,60,0.8);
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- 车机屏幕 -->
  <div class="car-screen" id="carScreen">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span id="clock">--:--</span>
      <span>AI小组件 · Demo</span>
    </div>

    <!-- WebView 容器 -->
    <div class="webview-container" id="webviewContainer">
      <iframe id="widgetFrame" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="loading-overlay" id="loadingOverlay"></div>
    </div>

    <!-- 切换箭头 -->
    <div class="nav-arrow left" id="navLeft" onclick="switchWidget(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="nav-arrow right" id="navRight" onclick="switchWidget(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </div>

    <!-- 圆点指示器 -->
    <div class="dot-indicator" id="dotIndicator"></div>

    <!-- 同步到达通知 -->
    <div class="sync-toast" id="syncToast"></div>

    <!-- 轮询状态灯 -->
    <div class="poll-indicator" id="pollIndicator" title="自动同步监听中"></div>

    <!-- 滑动提示（首次切换时显示） -->
    <div class="swipe-hint" id="swipeHint">◀  滑动切换  ▶</div>

    <!-- 编辑态遮罩 -->
    <div class="edit-overlay" id="editOverlay">
      <div class="edit-hint">编辑模式 · 长按拖动可排序</div>
      <div class="edit-card-area" id="editCardArea">
        <div class="edit-card-wrapper">
          <button class="edit-delete-btn" id="editDeleteBtn">✕</button>
        </div>
      </div>
      <div class="edit-card-label" id="editCardLabel"></div>
      <div class="edit-dots" id="editDots"></div>
      <div class="edit-bottom-bar">
        <button class="edit-done-btn" id="editDoneBtn">完成</button>
      </div>
      <!-- 删除确认 -->
      <div class="edit-confirm" id="editConfirm">
        <p id="editConfirmText">确定删除这张卡片？</p>
        <div class="edit-confirm-btns">
          <button class="ecb-cancel" id="editConfirmCancel">取消</button>
          <button class="ecb-delete" id="editConfirmDelete">删除</button>
        </div>
      </div>
    </div>

    <!-- 同步确认弹窗 -->
    <div class="sync-confirm-overlay" id="syncConfirmOverlay">
      <div class="sync-confirm-panel">
        <div class="sync-confirm-icon">📲</div>
        <div class="sync-confirm-title">收到新的卡片</div>
        <div class="sync-confirm-desc" id="syncConfirmDesc">来自手机端的卡片<br>是否接收并显示在桌面？</div>
        <div class="sync-confirm-buttons">
          <button class="sync-btn-cancel" id="syncBtnCancel">取消</button>
          <button class="sync-btn-accept" id="syncBtnAccept">接收</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 缩放信息 -->
  <div class="scale-info" id="scaleInfo">896×1464</div>

  <!-- 控制面板 -->
  <div class="control-panel">
    <button class="ctrl-btn active" onclick="loadPreset('love')">💕 恋爱</button>
    <button class="ctrl-btn" onclick="loadPreset('baby')">👶 宝宝</button>
    <button class="ctrl-btn" onclick="loadPreset('holiday')">🏖️ 放假</button>
    <button class="ctrl-btn" onclick="loadPreset('warm')">🔥 暖橙</button>
    <button class="ctrl-btn" onclick="loadPreset('news')">📰 新闻</button>
    <button class="ctrl-btn" onclick="loadPreset('alarm')">⏰ 闹钟</button>
    <button class="ctrl-btn primary" onclick="loadAllWidgets()">全部加载</button>
    <button class="ctrl-btn" onclick="loadSyncedWidgets()" id="syncLoadBtn">🔄 同步组件</button>
  </div>

<script>
  // ── 组件管理 ──

  var WIDGET_BASE = '/widget-templates';
  var API_BASE = '';  // 同源，前端 dev server 代理 /api

  // 模板路径映射（用于同步组件）
  var TEMPLATE_URL_MAP = {
    'anniversary-love':    WIDGET_BASE + '/anniversary/love/index.html',
    'anniversary-baby':    WIDGET_BASE + '/anniversary/baby/index.html',
    'anniversary-holiday': WIDGET_BASE + '/anniversary/holiday/index.html',
    'anniversary-warm':    WIDGET_BASE + '/anniversary/warm/index.html',
    'news-daily':          WIDGET_BASE + '/news/index.html',
    'news':                WIDGET_BASE + '/news/index.html',
    'alarm-clock':         WIDGET_BASE + '/alarm/index.html',
    'alarm':               WIDGET_BASE + '/alarm/index.html',
    'weather-realtime':    WIDGET_BASE + '/weather/index.html',
    'weather':             WIDGET_BASE + '/weather/index.html',
    'music-player':        WIDGET_BASE + '/music/index.html',
    'music':               WIDGET_BASE + '/music/index.html',
    'calendar-schedule':   WIDGET_BASE + '/calendar/index.html',
    'calendar':            WIDGET_BASE + '/calendar/index.html',
  };

  // 组件类型名称映射（用于确认弹窗）
  var TYPE_NAMES = {
    'weather': '实时天气', 'anniversary-love': '恋爱纪念',
    'anniversary-baby': '宝宝相册', 'anniversary-holiday': '放假倒计时',
    'news': '每日新闻', 'alarm': '闹钟',
    'music': '音乐播放', 'calendar': '日程安排'
  };

  function getTemplateUrl(componentType, theme) {
    return TEMPLATE_URL_MAP[componentType + '-' + theme]
        || TEMPLATE_URL_MAP[componentType]
        || null;
  }

  function getWidgetTypeName(item) {
    if (item.type === 'code') return 'AI编程';
    // Try component_type-theme, then component_type, then label
    var key = item.component_type ? (item.component_type + '-' + (item.theme || '')) : '';
    return TYPE_NAMES[key] || TYPE_NAMES[item.component_type] || item.label || '未知';
  }

  // 组件列表（模板路径 + 默认参数）
  var WIDGET_PRESETS = {
    love: {
      path: WIDGET_BASE + '/anniversary/love/index.html',
      label: '恋爱纪念',
      params: { title: '恋爱纪念', startDate: '2024-06-01', subtitle: '每一天都算数' }
    },
    baby: {
      path: WIDGET_BASE + '/anniversary/baby/index.html',
      label: '宝宝成长',
      params: { title: '宝宝成长', startDate: '2025-01-15', subtitle: '慢慢长大不着急' }
    },
    holiday: {
      path: WIDGET_BASE + '/anniversary/holiday/index.html',
      label: '放假倒计时',
      params: { title: '国庆快乐', targetDate: '2026-10-01', subtitle: '假期在向你招手' }
    },
    warm: {
      path: WIDGET_BASE + '/anniversary/warm/index.html',
      label: '暖橙纪念',
      params: { title: '结婚纪念', startDate: '2020-05-20', subtitle: '岁月温柔' }
    },
    news: {
      path: WIDGET_BASE + '/news/index.html',
      label: '每日新闻',
      params: {}
    },
    alarm: {
      path: WIDGET_BASE + '/alarm/index.html',
      label: '闹钟',
      params: {}
    }
  };

  // widgetItems: 统一的渲染列表 [{ type: 'preset'|'synced'|'code', key, path, params, label }]
  var widgetItems = [];
  var currentIndex = 0;
  var hideTimer = null;

  var frame = document.getElementById('widgetFrame');
  var container = document.getElementById('webviewContainer');
  var navLeft = document.getElementById('navLeft');
  var navRight = document.getElementById('navRight');
  var dotIndicator = document.getElementById('dotIndicator');
  var carScreen = document.getElementById('carScreen');

  // ── 确认弹窗相关 ──
  var syncConfirmOverlay = document.getElementById('syncConfirmOverlay');
  var syncConfirmDesc = document.getElementById('syncConfirmDesc');
  var syncBtnCancel = document.getElementById('syncBtnCancel');
  var syncBtnAccept = document.getElementById('syncBtnAccept');
  var pendingWidgetItems = null;   // 待确认的新组件列表
  var autoAcceptTimer = null;      // 5秒自动接收计时器

  // ── 滑动手势相关 ──
  var touchStartX = 0;
  var touchStartY = 0;
  var touchDeltaX = 0;
  var isSwiping = false;
  var swipeThreshold = 100;        // 滑动阈值（px）

  // ── 时钟 ──
  function updateClock() {
    var now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2, '0') + ':' +
      now.getMinutes().toString().padStart(2, '0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── 构建预设 widgetItem ──
  function presetToItem(key) {
    var preset = WIDGET_PRESETS[key];
    if (!preset) return null;
    return { type: 'preset', key: key, path: preset.path, params: preset.params, label: preset.label };
  }

  // ── 加载单个预设 ──
  function loadPreset(key) {
    var item = presetToItem(key);
    if (!item) return;
    widgetItems = [item];
    currentIndex = 0;
    renderWidget();
    updateControls();

    document.querySelectorAll('.ctrl-btn').forEach(function(btn) {
      var preset = WIDGET_PRESETS[key];
      btn.classList.toggle('active', btn.textContent.includes(preset ? preset.label : ''));
    });
  }

  // ── 加载全部预设 ──
  function loadAllWidgets() {
    widgetItems = Object.keys(WIDGET_PRESETS).map(presetToItem).filter(Boolean);
    currentIndex = 0;
    renderWidget();
    updateControls();

    document.querySelectorAll('.ctrl-btn').forEach(function(btn) { btn.classList.remove('active'); });
    var primaryBtn = document.querySelector('.ctrl-btn.primary');
    if (primaryBtn) primaryBtn.classList.add('active');
  }

  // ── 从后端拉取同步组件 ──
  async function loadSyncedWidgets() {
    var syncBtn = document.getElementById('syncLoadBtn');
    syncBtn.textContent = '⏳ 加载中…';
    syncBtn.disabled = true;

    try {
      // 1. 获取设备上已同步的 widget_id 列表
      var deviceRes = await fetch(API_BASE + '/api/device/demo_device/widgets');
      if (!deviceRes.ok) throw new Error('HTTP ' + deviceRes.status);
      var deviceData = await deviceRes.json();
      var syncedWidgets = (deviceData.widgets || []).filter(function(w) { return w.status === 'success'; });

      if (syncedWidgets.length === 0) {
        syncBtn.textContent = '❌ 无同步组件';
        setTimeout(function() { syncBtn.textContent = '🔄 同步组件'; syncBtn.disabled = false; }, 2000);
        return;
      }

      // 2. 逐个获取 widget 详情
      var syncedItems = [];
      for (var i = 0; i < syncedWidgets.length; i++) {
        var w = syncedWidgets[i];
        try {
          var detailRes = await fetch(API_BASE + '/api/widgets/' + w.widget_id);
          if (!detailRes.ok) continue;
          var detail = await detailRes.json();

          // AI编程模式：直接用 html_content 渲染
          if (detail.generation_mode === 'code' && detail.html_content) {
            syncedItems.push({
              type: 'code',
              key: w.widget_id,
              html_content: detail.html_content,
              label: 'AI编程'
            });
            continue;
          }

          var templateUrl = getTemplateUrl(detail.component_type, detail.theme);
          if (!templateUrl) continue;

          var widgetParams = detail.params || {};
          syncedItems.push({
            type: 'synced',
            key: w.widget_id,
            path: templateUrl,
            params: widgetParams,
            style_preset: detail.style_preset || widgetParams.style_preset,
            component_type: detail.component_type,
            theme: detail.theme,
            label: detail.component_type + '/' + (detail.theme || '')
          });
        } catch (e) {
          console.warn('[Sync] Failed to fetch widget detail:', w.widget_id, e);
        }
      }

      if (syncedItems.length === 0) {
        syncBtn.textContent = '❌ 无可渲染组件';
        setTimeout(function() { syncBtn.textContent = '🔄 同步组件'; syncBtn.disabled = false; }, 2000);
        return;
      }

      // 3. 追加到已有预设列表（或单独展示同步组件）
      widgetItems = Object.keys(WIDGET_PRESETS).map(presetToItem).filter(Boolean).concat(syncedItems);
      currentIndex = widgetItems.length - syncedItems.length; // 跳到第一个同步组件
      renderWidget();
      updateControls();

      syncBtn.textContent = '✅ 已加载 ' + syncedItems.length + ' 个';
      document.querySelectorAll('.ctrl-btn').forEach(function(btn) { btn.classList.remove('active'); });
    } catch (e) {
      console.error('[Sync] Load error:', e);
      syncBtn.textContent = '❌ 加载失败';
    } finally {
      setTimeout(function() { syncBtn.textContent = '🔄 同步组件'; syncBtn.disabled = false; }, 3000);
    }
  }

  // ── 渲染当前组件（支持 preset / synced / code 三种模式） ──
  var loadingOverlay = document.getElementById('loadingOverlay');

  async function renderWidget(direction) {
    if (widgetItems.length === 0) return;

    var item = widgetItems[currentIndex];
    if (!item) return;

    // 显示加载遮罩
    loadingOverlay.classList.add('active');

    // 改进的切换动画
    if (direction !== undefined) {
      var animClasses = ['slide-left', 'slide-right',
        'anim-slide-out-left', 'anim-slide-out-right',
        'anim-slide-in-from-left', 'anim-slide-in-from-right'];
      animClasses.forEach(function(c) { container.classList.remove(c); });
      void container.offsetWidth; // force reflow
      container.classList.add(direction > 0 ? 'anim-slide-in-from-right' : 'anim-slide-in-from-left');
      // Remove animation class after it finishes
      setTimeout(function() {
        container.classList.remove('anim-slide-in-from-right', 'anim-slide-in-from-left');
      }, 320);
    }

    if (item.type === 'code') {
      // AI编程模式：直接用 html_content 渲染到 sandbox iframe
      try {
        frame.removeAttribute('src');
        frame.srcdoc = item.html_content;
        frame.onload = function() {
          setTimeout(function() { loadingOverlay.classList.remove('active'); }, 100);
        };
      } catch (e) {
        console.error('[Render] Code widget error:', e);
        loadingOverlay.classList.remove('active');
      }
    } else if (item.type === 'synced') {
      // 同步组件：用 srcdoc 注入 __WIDGET_PARAMS__（与 preview.js 一致）
      try {
        var resp = await fetch(item.path + '?v=' + Date.now(), { cache: 'no-cache' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var html = await resp.text();

        var templateBasePath = item.path.replace('index.html', '');

        // 修复相对路径（与 render-widget.js 保持一致）
        var ts = Date.now();
        html = html.replace(/(src|href)="\.\.\/\.\.\/shared\//g, '$1="/widget-templates/shared/');
        html = html.replace(/(src|href)="\.\.\/shared\//g, '$1="/widget-templates/shared/');
        html = html.replace(/href="style\.css"/g, 'href="' + templateBasePath + 'style.css?v=' + ts + '"');
        html = html.replace(/src="style\.css"/g, 'src="' + templateBasePath + 'style.css?v=' + ts + '"');
        html = html.replace(/src="main\.js"/g, 'src="' + templateBasePath + 'main.js?v=' + ts + '"');
        html = html.replace(/(src|href)="(\/widget-templates\/[^"?]+)"/g, '$1="$2?v=' + ts + '"');

        // 注入 style_preset
        if (item.style_preset) {
          html = html.replace(/<html/, '<html data-style="' + item.style_preset + '"');
        }

        // 注入 templateBasePath + __WIDGET_DATA_MODE__ + __WIDGET_PARAMS__
        var basePathScript = '<script>window.__TEMPLATE_BASE_PATH__ = "' + templateBasePath + '";<\/script>';
        var modeScript = '<script>window.__WIDGET_DATA_MODE__ = "live";<\/script>';
        var paramsScript = '<script>window.__WIDGET_PARAMS__ = ' + JSON.stringify(item.params) + ';<\/script>';
        html = html.replace('</head>', basePathScript + modeScript + paramsScript + '</head>');

        frame.removeAttribute('src');
        frame.srcdoc = html;
        frame.onload = function() {
          setTimeout(function() { loadingOverlay.classList.remove('active'); }, 100);
        };
      } catch (e) {
        console.error('[Render] Synced widget error:', e);
        loadingOverlay.classList.remove('active');
      }
    } else {
      // 预设组件：直接加载 iframe src
      frame.removeAttribute('srcdoc');
      frame.src = item.path;
      frame.onload = function() {
        setTimeout(function() { loadingOverlay.classList.remove('active'); }, 100);
      };
    }
  }

  // ── 切换组件（带动画） ──
  function switchWidget(direction) {
    if (widgetItems.length <= 1) return;

    currentIndex += direction;
    if (currentIndex < 0) currentIndex = widgetItems.length - 1;
    if (currentIndex >= widgetItems.length) currentIndex = 0;

    renderWidget(direction);
    updateDots();
    resetHideTimer();
    maybeShowSwipeHint();
  }

  // ── 更新导航控件 ──
  function updateControls() {
    var single = widgetItems.length <= 1;
    carScreen.classList.toggle('single-widget', single);

    if (!single) {
      updateDots();
      showNavigation();
      resetHideTimer();
    } else {
      updateDots();
    }
  }

  // ── 更新圆点 ──
  function updateDots() {
    dotIndicator.innerHTML = '';
    if (widgetItems.length <= 1) return;
    widgetItems.forEach(function(_, i) {
      var dot = document.createElement('div');
      dot.className = 'dot' + (i === currentIndex ? ' active' : '');
      dotIndicator.appendChild(dot);
    });
  }

  // ── 显示/隐藏导航 ──
  function showNavigation() {
    navLeft.classList.remove('hidden');
    navRight.classList.remove('hidden');
    dotIndicator.classList.remove('hidden');
  }

  function hideNavigation() {
    navLeft.classList.add('hidden');
    navRight.classList.add('hidden');
    // 圆点保持显示
  }

  function resetHideTimer() {
    clearTimeout(hideTimer);
    showNavigation();
    hideTimer = setTimeout(hideNavigation, 3000);
  }

  // 触摸/鼠标移动时显示导航
  carScreen.addEventListener('mousemove', resetHideTimer);

  // ── 键盘快捷键 ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') {
      switchWidget(-1);
      if (isEditMode) updateEditUI();
    }
    if (e.key === 'ArrowRight') {
      switchWidget(1);
      if (isEditMode) updateEditUI();
    }
    if (e.key === 'Escape' && isEditMode) exitEditMode();
  });

  // ══════════════════════════════════════════════
  // Feature: 编辑态（长按进入，删除/排序/退出）
  // ══════════════════════════════════════════════

  var isEditMode = false;
  var longPressTimer = null;
  var editOverlay = document.getElementById('editOverlay');
  var editDots = document.getElementById('editDots');
  var editCardLabel = document.getElementById('editCardLabel');
  var editConfirm = document.getElementById('editConfirm');

  function enterEditMode() {
    if (isEditMode || widgetItems.length === 0) return;
    isEditMode = true;
    carScreen.classList.add('editing');
    editOverlay.classList.add('active');
    updateEditUI();
  }

  function exitEditMode() {
    isEditMode = false;
    carScreen.classList.remove('editing');
    editOverlay.classList.remove('active');
    editConfirm.classList.remove('show');
    // 恢复 webview 缩放
    var wc = document.getElementById('webviewContainer');
    wc.style.transform = '';
    wc.style.borderRadius = '';
  }

  function updateEditUI() {
    // 更新标签
    var item = widgetItems[currentIndex];
    if (item) {
      editCardLabel.textContent = (item.label || item.key || '').replace(/\//g, ' · ');
    }
    // 更新圆点
    editDots.innerHTML = '';
    for (var i = 0; i < widgetItems.length; i++) {
      var d = document.createElement('div');
      d.className = 'ed' + (i === currentIndex ? ' active' : '');
      editDots.appendChild(d);
    }
  }

  // 长按检测（600ms）
  var lpStartX = 0, lpStartY = 0;

  carScreen.addEventListener('touchstart', function(e) {
    if (isEditMode) return;
    lpStartX = e.touches[0].clientX;
    lpStartY = e.touches[0].clientY;
    longPressTimer = setTimeout(function() {
      enterEditMode();
    }, 600);
  }, { passive: true });

  carScreen.addEventListener('touchmove', function(e) {
    if (longPressTimer) {
      var dx = Math.abs(e.touches[0].clientX - lpStartX);
      var dy = Math.abs(e.touches[0].clientY - lpStartY);
      if (dx > 10 || dy > 10) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }
  }, { passive: true });

  carScreen.addEventListener('touchend', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }, { passive: true });

  // 编辑态下点击卡片区域 → 退出编辑
  document.getElementById('editCardArea').addEventListener('click', function(e) {
    // 如果点击的是删除按钮则不退出
    if (e.target.id === 'editDeleteBtn' || e.target.closest('.edit-delete-btn')) return;
    exitEditMode();
  });

  // 完成按钮
  document.getElementById('editDoneBtn').addEventListener('click', exitEditMode);

  // 删除按钮 → 弹出确认
  document.getElementById('editDeleteBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    var item = widgetItems[currentIndex];
    document.getElementById('editConfirmText').textContent = '确定删除「' + (item.label || '此卡片') + '」？';
    editConfirm.classList.add('show');
  });

  // 确认删除
  document.getElementById('editConfirmDelete').addEventListener('click', function() {
    var removedItem = widgetItems[currentIndex];
    widgetItems.splice(currentIndex, 1);

    // 从 knownWidgetIds 移除
    if (removedItem && removedItem.key) {
      knownWidgetIds.delete(removedItem.key);
      _persistKnownIds();
    }

    editConfirm.classList.remove('show');

    if (widgetItems.length === 0) {
      exitEditMode();
      // 显示默认预设
      widgetItems = Object.keys(WIDGET_PRESETS).map(presetToItem).filter(Boolean);
      currentIndex = 0;
      renderWidget(1);
      updateControls();
      return;
    }

    if (currentIndex >= widgetItems.length) currentIndex = widgetItems.length - 1;
    renderWidget(1);
    updateControls();
    updateEditUI();
  });

  // 取消删除
  document.getElementById('editConfirmCancel').addEventListener('click', function() {
    editConfirm.classList.remove('show');
  });

  // 编辑态下左右切换（触摸）
  var editTouchStartX = 0;
  editOverlay.addEventListener('touchstart', function(e) {
    editTouchStartX = e.touches[0].clientX;
  }, { passive: true });

  editOverlay.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - editTouchStartX;
    if (Math.abs(dx) > 60 && widgetItems.length > 1) {
      switchWidget(dx < 0 ? 1 : -1);
      updateEditUI();
    }
  }, { passive: true });

  // ── 同步到达通知 ──
  function showSyncToast(message) {
    var toast = document.getElementById('syncToast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 3000);
  }

  // ══════════════════════════════════════════════
  // Feature 1: 确认弹窗
  // ══════════════════════════════════════════════

  function showSyncConfirm(newItems) {
    pendingWidgetItems = newItems;

    // 构建描述文本
    var desc;
    if (newItems.length === 1) {
      var typeName = getWidgetTypeName(newItems[0]);
      desc = '来自手机端的「' + typeName + '」卡片<br>是否接收并显示在桌面？';
    } else {
      desc = '来自手机端的 ' + newItems.length + ' 张卡片<br>是否接收并显示在桌面？';
    }
    syncConfirmDesc.innerHTML = desc;

    // 显示弹窗
    syncConfirmOverlay.classList.add('visible');

    // 5秒自动接收
    clearTimeout(autoAcceptTimer);
    autoAcceptTimer = setTimeout(function() {
      acceptPendingWidgets();
    }, 5000);
  }

  function acceptPendingWidgets() {
    clearTimeout(autoAcceptTimer);
    syncConfirmOverlay.classList.remove('visible');

    if (!pendingWidgetItems || pendingWidgetItems.length === 0) return;

    var newItems = pendingWidgetItems;
    pendingWidgetItems = null;

    // 对每个新组件：如果已有相同 key（widget_id），替换；否则追加
    var updatedCount = 0;
    var addedItems = [];
    for (var n = 0; n < newItems.length; n++) {
      var item = newItems[n];
      var existingIdx = -1;
      for (var e = 0; e < widgetItems.length; e++) {
        if (widgetItems[e].key === item.key) { existingIdx = e; break; }
      }
      if (existingIdx >= 0) {
        widgetItems[existingIdx] = item;  // 覆盖更新
        updatedCount++;
      } else {
        addedItems.push(item);
      }
    }
    if (addedItems.length > 0) {
      widgetItems = widgetItems.concat(addedItems);
    }

    // 跳转到更新/新增的第一个组件
    if (addedItems.length > 0) {
      currentIndex = widgetItems.length - addedItems.length;
    } else if (updatedCount > 0) {
      // 已更新的组件，跳到第一个被更新的位置
      for (var u = 0; u < widgetItems.length; u++) {
        if (widgetItems[u].key === newItems[0].key) { currentIndex = u; break; }
      }
    }
    renderWidget(1);
    updateControls();

    // 显示到达通知（区分新增/更新）
    var label;
    if (updatedCount > 0 && addedItems.length === 0) {
      label = '已更新 ' + updatedCount + ' 张卡片';
    } else if (addedItems.length === 1 && updatedCount === 0) {
      label = '收到新卡片: ' + addedItems[0].label;
    } else {
      label = '收到 ' + addedItems.length + ' 张新卡片' + (updatedCount > 0 ? '，更新 ' + updatedCount + ' 张' : '');
    }
    showSyncToast(label);

    console.log('[Confirm] Accepted widgets:', newItems.map(function(i) { return i.key; }));
  }

  function dismissPendingWidgets() {
    clearTimeout(autoAcceptTimer);
    syncConfirmOverlay.classList.remove('visible');
    pendingWidgetItems = null;
    console.log('[Confirm] User dismissed new widgets');
  }

  // 绑定确认弹窗按钮
  syncBtnAccept.addEventListener('click', acceptPendingWidgets);
  syncBtnCancel.addEventListener('click', dismissPendingWidgets);

  // ══════════════════════════════════════════════
  // Feature 3: 触摸滑动手势
  // ══════════════════════════════════════════════

  // 滑动提示（仅首次显示）
  function maybeShowSwipeHint() {
    if (widgetItems.length <= 1) return;
    if (localStorage.getItem('car_sim_swipe_hint_shown')) return;

    var hint = document.getElementById('swipeHint');
    hint.classList.add('visible');
    localStorage.setItem('car_sim_swipe_hint_shown', '1');

    setTimeout(function() {
      hint.classList.remove('visible');
    }, 2500);
  }

  // 触摸事件监听（绑定在 car-screen 上）
  carScreen.addEventListener('touchstart', function(e) {
    if (widgetItems.length <= 1) return;
    // 不在确认弹窗上滑动
    if (syncConfirmOverlay.classList.contains('visible')) return;

    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchDeltaX = 0;
    isSwiping = false;
    resetHideTimer();
  }, { passive: true });

  carScreen.addEventListener('touchmove', function(e) {
    if (widgetItems.length <= 1) return;
    if (syncConfirmOverlay.classList.contains('visible')) return;

    var dx = e.touches[0].clientX - touchStartX;
    var dy = e.touches[0].clientY - touchStartY;

    // 水平滑动幅度大于垂直时才认定为切换手势
    if (!isSwiping && Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
      isSwiping = true;
    }

    if (isSwiping) {
      touchDeltaX = dx;
      // 实时跟手偏移（带阻尼）
      var dampedX = touchDeltaX * 0.4;
      container.style.transform = 'translateX(' + dampedX + 'px)';
      container.style.opacity = Math.max(0.5, 1 - Math.abs(dampedX) / 500).toString();
    }
  }, { passive: true });

  carScreen.addEventListener('touchend', function(e) {
    if (!isSwiping) return;
    isSwiping = false;

    // 还原容器样式
    container.style.transform = '';
    container.style.opacity = '';

    if (Math.abs(touchDeltaX) > swipeThreshold) {
      // 超过阈值：切换卡片
      var direction = touchDeltaX < 0 ? 1 : -1; // 左滑 = 下一张，右滑 = 上一张
      switchWidget(direction);
    }

    touchDeltaX = 0;
  }, { passive: true });

  // 鼠标拖拽（桌面端兼容）
  var mouseDown = false;
  var mouseStartX = 0;

  carScreen.addEventListener('mousedown', function(e) {
    if (widgetItems.length <= 1) return;
    if (syncConfirmOverlay.classList.contains('visible')) return;
    mouseDown = true;
    mouseStartX = e.clientX;
    touchDeltaX = 0;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!mouseDown) return;
    touchDeltaX = e.clientX - mouseStartX;
    var dampedX = touchDeltaX * 0.4;
    container.style.transform = 'translateX(' + dampedX + 'px)';
    container.style.opacity = Math.max(0.5, 1 - Math.abs(dampedX) / 500).toString();
  });

  document.addEventListener('mouseup', function(e) {
    if (!mouseDown) return;
    mouseDown = false;

    container.style.transform = '';
    container.style.opacity = '';

    if (Math.abs(touchDeltaX) > swipeThreshold) {
      var direction = touchDeltaX < 0 ? 1 : -1;
      switchWidget(direction);
    }

    touchDeltaX = 0;
  });

  // ══════════════════════════════════════════════
  // 自动轮询：监听手机端推送的新组件（含确认弹窗）
  // ══════════════════════════════════════════════

  var POLL_INTERVAL = 5000;
  // 持久化已知 widget_id，刷新后不重复弹窗
  var _savedIds = [];
  try { _savedIds = JSON.parse(localStorage.getItem('car_sim_known_ids') || '[]'); } catch(e) {}
  var knownWidgetIds = new Set(_savedIds);
  var pollTimer = null;

  function _persistKnownIds() {
    try { localStorage.setItem('car_sim_known_ids', JSON.stringify(Array.from(knownWidgetIds))); } catch(e) {}
  }

  async function pollForNewWidgets() {
    var indicator = document.getElementById('pollIndicator');
    indicator.classList.add('polling');

    try {
      var res = await fetch(API_BASE + '/api/device/demo_device/widgets');
      if (!res.ok) return;
      var data = await res.json();
      var successWidgets = (data.widgets || []).filter(function(w) { return w.status === 'success'; });

      // 找出新到达的组件
      var newWidgets = successWidgets.filter(function(w) { return !knownWidgetIds.has(w.widget_id); });
      if (newWidgets.length === 0) return;

      // 记录所有已知 ID（持久化到 localStorage）
      for (var i = 0; i < successWidgets.length; i++) knownWidgetIds.add(successWidgets[i].widget_id);
      _persistKnownIds();

      // 拉取新组件详情
      var newItems = [];
      for (var j = 0; j < newWidgets.length; j++) {
        var w = newWidgets[j];
        try {
          var detailRes = await fetch(API_BASE + '/api/widgets/' + w.widget_id);
          if (!detailRes.ok) continue;
          var detail = await detailRes.json();

          // AI编程模式：直接用 html_content 渲染
          if (detail.generation_mode === 'code' && detail.html_content) {
            newItems.push({
              type: 'code',
              key: w.widget_id,
              html_content: detail.html_content,
              label: 'AI编程'
            });
            continue;
          }

          var templateUrl = getTemplateUrl(detail.component_type, detail.theme);
          if (!templateUrl) continue;

          var pollParams = detail.params || {};
          newItems.push({
            type: 'synced',
            key: w.widget_id,
            path: templateUrl,
            params: pollParams,
            style_preset: detail.style_preset || pollParams.style_preset,
            component_type: detail.component_type,
            theme: detail.theme,
            label: detail.component_type + '/' + (detail.theme || '')
          });
        } catch (e) {
          console.warn('[Poll] Fetch detail error:', w.widget_id, e);
        }
      }

      if (newItems.length === 0) return;

      // 弹出确认弹窗，而非直接渲染
      showSyncConfirm(newItems);

      console.log('[Poll] New widgets arrived, showing confirm:', newItems.map(function(i) { return i.key; }));
    } catch (e) {
      // 静默处理网络错误
      console.warn('[Poll] Error:', e.message);
    } finally {
      indicator.classList.remove('polling');
    }
  }

  function startPolling() {
    // 初始记录已有的 synced widget IDs（避免首次轮询误报）
    fetch(API_BASE + '/api/device/demo_device/widgets')
      .then(function(r) { return r.ok ? r.json() : { widgets: [] }; })
      .then(function(data) {
        var widgets = data.widgets || [];
        for (var i = 0; i < widgets.length; i++) knownWidgetIds.add(widgets[i].widget_id);
        _persistKnownIds();
        console.log('[Poll] Initial known widgets:', knownWidgetIds.size);
      })
      .catch(function() {});

    pollTimer = setInterval(pollForNewWidgets, POLL_INTERVAL);
    console.log('[Poll] Auto-sync started (' + (POLL_INTERVAL / 1000) + 's interval)');
  }

  // ── 车端环境标志（供 bridge.js 检测） ──
  window.__CAR_WIDGET__ = true;

  // ── 初始加载 ──
  loadPreset('love');
  startPolling();
</script>
