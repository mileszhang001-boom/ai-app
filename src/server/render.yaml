services:
  - type: web
    name: ai-widget-api
    runtime: python
    rootDir: src/server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCK
        value: "false"
      - key: QWEN_API_KEY
        sync: false
      - key: AI_MODEL
        value: "qwen-plus"
