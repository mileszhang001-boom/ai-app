<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-style="glass">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=896, initial-scale=1.0">
  <title>日程卡片</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/overlay.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget-root">
    <div id="content">
      <!-- calHeader: 日程 + 周几 -->
      <div class="cal-header">
        <span class="cal-header-title" id="titleText">日程</span>
        <span class="cal-header-week" id="weekText">周六</span>
      </div>

      <!-- date-section: hero date + meta -->
      <div class="date-section">
        <span class="big-date" id="bigDate">22</span>
        <div class="date-meta">
          <span class="date-month" id="dateMonth">3月 2026</span>
          <span class="date-lunar" id="dateLunar">二月廿三</span>
        </div>
      </div>

      <!-- spacer -->
      <div class="spacer-48"></div>

      <!-- divider -->
      <div class="divider-line"></div>

      <!-- spacer -->
      <div class="spacer-40"></div>

      <!-- event rows -->
      <div class="event-list" id="eventList">
        <!-- dynamically rendered by main.js -->
      </div>

      <!-- spacer -->
      <div class="spacer-64"></div>

      <!-- next-meeting pill -->
      <div class="next-meeting" id="nextMeeting">
        <svg class="next-meeting-icon" width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="var(--dyn-accent, #3B82F6)" stroke-width="2"/>
          <path d="M12 6v6l4 2" stroke="var(--dyn-accent, #3B82F6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="next-meeting-text" id="nextMeetingText">距下次会议还有 45 分钟</span>
      </div>
    </div>

    <!-- FAB add button -->
    <button class="fab-add-cal" id="fabAddCal">+</button>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/color-engine.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/overlay.js"></script>
  <script src="main.js"></script>
</body>
</html>
