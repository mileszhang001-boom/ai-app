<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1013">
  <title>天气卡片</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/visual-styles.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shared/overlay.css">
</head>
<body>
  <div class="widget-weather">
    <!-- 天气动画画布 -->
    <canvas class="weather-canvas" id="weatherCanvas"></canvas>

    <!-- Sun glow — Pencil: 500×500 ellipse, radial #FFD70060→transparent, opacity 0.5 -->
    <div class="sun-glow"></div>

    <div class="content">
      <!-- 顶部：城市 + 日期 -->
      <div class="header">
        <div class="location" id="locationName">北京<span class="location-pin">📍</span></div>
        <div class="date" id="weatherDate">--月--日</div>
      </div>

      <!-- 核心：温度 + 天气图标 -->
      <div class="hero-section">
        <div class="temp-display">
          <span class="temp-number" id="currentTemp">--</span>
          <span class="temp-unit">°</span>
        </div>
        <div class="weather-desc" id="weatherDesc">--</div>
        <div class="feels-like" id="feelsLike">体感 --°</div>
      </div>

      <!-- 毛玻璃详情卡 -->
      <div class="glass-details">
        <div class="detail-item">
          <div class="detail-label">湿度</div>
          <div class="detail-value" id="humidity">--%</div>
        </div>
        <div class="detail-divider"></div>
        <div class="detail-item">
          <div class="detail-label">风力</div>
          <div class="detail-value" id="wind">--级</div>
        </div>
        <div class="detail-divider"></div>
        <div class="detail-item">
          <div class="detail-label">紫外线</div>
          <div class="detail-value" id="aqi">--</div>
        </div>
      </div>

      <!-- 未来3天预报 -->
      <div class="forecast-row">
        <div class="forecast-day" id="forecast0">
          <div class="forecast-label">明天</div>
          <div class="forecast-icon">--</div>
          <div class="forecast-temp">--°/--°</div>
        </div>
        <div class="forecast-day" id="forecast1">
          <div class="forecast-label">后天</div>
          <div class="forecast-icon">--</div>
          <div class="forecast-temp">--°/--°</div>
        </div>
        <div class="forecast-day" id="forecast2">
          <div class="forecast-label">--</div>
          <div class="forecast-icon">--</div>
          <div class="forecast-temp">--°/--°</div>
        </div>
      </div>

      <!-- AI穿衣建议 -->
      <div class="glass-suggestion">
        <div class="suggestion-label">AI 建议</div>
        <div class="suggestion-text" id="suggestion">--</div>
      </div>
    </div>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/color-engine.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/overlay.js"></script>
  <script src="main.js"></script>
</body>
</html>
