<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-style="glass">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=896, initial-scale=1.0">
  <meta name="theme-color" content="#0e1013">
  <title>天气卡片</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/visual-styles.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shared/overlay.css">
</head>
<body>
  <div id="widget-root" class="widget-weather">
    <!-- Sun glow — Pencil: 500×500 ellipse, radial #FFD70060→transparent, opacity 0.5 -->
    <div id="sun-glow" class="sun-glow"></div>

    <div id="content" class="content">
      <!-- 顶部：城市 + 日期 -->
      <div id="header" class="header">
        <div class="city-name" id="cityName">北京  ▾</div>
        <div class="date-text" id="dateText">--月--日 周-</div>
      </div>

      <!-- 占位 spacer -->
      <div class="spacer-160"></div>

      <!-- 核心：天气图标 + 温度 + 天气 + 体感 -->
      <div id="hero" class="hero">
        <div class="sun-icon" id="sunIcon">☀️</div>
        <div class="temperature" id="temperature">--°</div>
        <div class="condition" id="condition">--</div>
        <div class="feels-like" id="feelsLike">体感 --°</div>
      </div>

      <div class="spacer-32"></div>

      <!-- 毛玻璃详情卡 (3 pills) -->
      <div id="pill-row" class="pill-row">
        <div class="pill" id="pillHumidity">
          <div class="pill-label">湿度</div>
          <div class="pill-value" id="humidity">--%</div>
          <div class="pill-icon">💧</div>
        </div>
        <div class="pill" id="pillWind">
          <div class="pill-label">风力</div>
          <div class="pill-value" id="wind">--级</div>
          <div class="pill-icon">🌬️</div>
        </div>
        <div class="pill" id="pillUv">
          <div class="pill-label">紫外线</div>
          <div class="pill-value" id="uv">--</div>
          <div class="pill-icon">☀️</div>
        </div>
      </div>

      <div class="spacer-24"></div>

      <!-- 未来3天预报 -->
      <div id="forecast-row" class="forecast-row">
        <div class="forecast-day" id="forecast0">
          <div class="forecast-label">--</div>
          <div class="forecast-icon">--</div>
          <div class="forecast-temp">--°/--°</div>
        </div>
        <div class="forecast-day" id="forecast1">
          <div class="forecast-label">--</div>
          <div class="forecast-icon">--</div>
          <div class="forecast-temp">--°/--°</div>
        </div>
        <div class="forecast-day" id="forecast2">
          <div class="forecast-label">--</div>
          <div class="forecast-icon">--</div>
          <div class="forecast-temp">--°/--°</div>
        </div>
      </div>

      <div class="spacer-24"></div>

      <!-- AI穿衣建议 -->
      <div id="ai-suggestion" class="ai-suggestion">
        <div class="ai-label" id="aiLabel">✨ AI 建议</div>
        <div class="ai-text" id="aiText">--</div>
      </div>
    </div>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/color-engine.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/overlay.js"></script>
  <script src="main.js"></script>
</body>
</html>
