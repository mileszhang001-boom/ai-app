<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-style="glass">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=896, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1c">
  <title>闹钟卡片</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/overlay.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget-root" class="widget-alarm">
    <div id="alarm-content" class="alarm-content">
      <!-- Header: 标题 + 菜单 -->
      <div class="alarm-header">
        <span class="alarm-title">闹钟</span>
        <span class="alarm-spacer"></span>
        <span class="view-toggle" id="viewToggle" title="切换视图">⏱</span>
        <span class="alarm-menu">···</span>
      </div>

      <!-- Countdown to next alarm -->
      <div class="alarm-countdown" id="countdownText">--</div>

      <!-- Spacer -->
      <div class="alarm-spacer-36"></div>

      <!-- Alarm list (dynamically rendered) -->
      <div id="alarmList" class="alarm-list"></div>

      <!-- Clock/dial view (hidden by default) -->
      <div id="clockView" style="display:none"></div>
    </div>

    <!-- FAB: add alarm -->
    <button class="fab-add" id="fabAdd">+</button>
  </div>

  <script src="../shared/bridge.js"></script>
  <script src="../shared/color-engine.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/overlay.js"></script>
  <script src="main.js"></script>
</body>
</html>
