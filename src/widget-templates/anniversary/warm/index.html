<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1013">
  <title>温暖纪念卡片</title>
  <!-- Google Fonts - Bebas Neue (DIN 风格替代品) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/visual-styles.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget-warm">
    <!-- 粒子画布 -->
    <canvas class="particle-canvas" id="particleCanvas"></canvas>

    <!-- 主光晕：偏右上，呼吸动效 -->
    <div class="glow-primary"></div>

    <!-- 副光晕：偏左下 -->
    <div class="glow-secondary"></div>

    <!-- 第三光晕：中部漫反射 -->
    <div class="glow-tertiary"></div>

    <!-- 氛围光线：底部渐隐的微光线条 -->
    <div class="ambient-line"></div>

    <!-- 毛玻璃信息卡片 -->
    <div class="glass-card">
      <!-- 高光扫过效果 -->
      <div class="glass-highlight"></div>

      <!-- v2.0: 统一标签 + 名字显示 -->
      <div class="panel-tag">暖心纪念</div>
      <div class="name-display" id="nameDisplay" style="display:none"></div>

      <!-- 核心数字 — 翻牌容器 -->
      <div class="hero-number" id="dayCounter">
        <span class="digit-group" id="digitGroup">0</span>
      </div>

      <!-- 英文单位：极度弱化 -->
      <div class="unit-label">days of warmth</div>

      <!-- 分割线 -->
      <div class="divider"></div>

      <!-- 中文副标题 -->
      <div class="subtitle-cn"></div>

      <!-- 中文辅助信息 -->
      <div class="caption-cn">纪念日 · 温暖回忆</div>
    </div>
  </div>

  <script src="../../shared/bridge.js"></script>
  <script src="../../shared/color-engine.js"></script>
  <script src="main.js"></script>
</body>
</html>
