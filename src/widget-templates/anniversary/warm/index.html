<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1013">
  <title>温暖纪念卡片</title>
  <!-- Google Fonts - Bebas Neue (DIN 风格替代品) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget-warm">
    <!-- 主光晕：偏右上 -->
    <div class="glow-primary"></div>

    <!-- 副光晕：偏左下，更弱 -->
    <div class="glow-secondary"></div>

    <!-- 氛围光线：底部渐隐的微光线条 -->
    <div class="ambient-line"></div>

    <!-- 内容区 -->
    <div class="content">
      <!-- 核心数字 -->
      <div class="hero-number" id="dayCounter">365</div>

      <!-- 英文单位：极度弱化 -->
      <div class="unit-label">days of warmth</div>

      <!-- 分割线 -->
      <div class="divider"></div>

      <!-- 中文副标题 -->
      <div class="subtitle-cn">温暖相伴的每一天</div>

      <!-- 中文辅助信息 -->
      <div class="caption-cn">纪念日 · 温暖回忆</div>
    </div>
  </div>

  <script src="../../shared/bridge.js"></script>
  <script src="main.js"></script>
</body>
</html>
