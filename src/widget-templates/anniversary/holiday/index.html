<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>假期倒计时</title>
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="photo-area" id="photoBg"></div>

      <div class="date-text" id="dateText"></div>
    </div>
    <canvas class="easter-egg-canvas" id="easterEggCanvas"></canvas>
  </div>
  <script src="../../shared/bridge.js"></script>
  <script src="../../shared/color-engine.js"></script>
  <script src="../../shared/easter-egg.js"></script>
