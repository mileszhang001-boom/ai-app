<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纪念日卡片</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .widget-card {
            width: 896px;
            height: 1464px;
            background: linear-gradient(135deg, #1A1A2E, #16213E);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .subtitle { font-size: 16px; opacity: 0.8; margin-bottom: 12px; }
        .hero-number { font-size: 72px; font-weight: 700; line-height: 1; }
        .title { font-size: 24px; font-weight: 500; margin-top: 8px; }
        .date-info { font-size: 16px; opacity: 0.6; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="widget-card">
        <div class="subtitle">每一天都算数</div>
        <div class="hero-number">已经365天</div>
        <div class="title">恋爱纪念日</div>
        <div class="date-info">起始于 2024-03-05</div>
    </div>
</body>
</html>
